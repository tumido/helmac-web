version: "3.8"

services:
    postgres:
        image: postgres:16-alpine
        container_name: helmac-db
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: helmac
            POSTGRES_PASSWORD: helmac123
            POSTGRES_DB: helmac
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U helmac -d helmac"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
